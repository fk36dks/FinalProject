apiVersion: apps/v1
kind: Deployment
metadata:
  name: finalproject
spec:
  replicas: 2
  selector: { matchLabels: { app: finalproject } }
  template:
    metadata: { labels: { app: finalproject } }
    spec:
      containers:
      - name: app
        image: docker.io/fk36dks/finalproject:latest
        imagePullPolicy: IfNotPresent
        ports: [{ containerPort: 8080 }]
        readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 5 }
        livenessProbe:  { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 10 }
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "500m", memory: "512Mi" }
